server:
  port: ${PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lovers_space?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
      username: ${SPRING_DATASOURCE_USERNAME:lovers_app}
      password: ${SPRING_DATASOURCE_PASSWORD:LoversApp@2026!}
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:}
  expire-hours: ${JWT_EXPIRE_HOURS:72}
